{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're offline — Mendoura</title>
<style>
  /* No external fonts/CDN here on purpose -- this page has to render with
     zero network, so it can't depend on anything that itself needs a
     successful fetch to show up. */
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 24px;
    background: #030712; color: #f3f4f6;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  img { width: 56px; height: 56px; margin-bottom: 20px; }
  h1 { font-size: 22px; margin: 0 0 10px; }
  p { color: #9ca3af; font-size: 14px; max-width: 32ch; line-height: 1.6; margin: 0 0 24px; }
  button {
    background: #7c3aed; color: #fff; border: none; border-radius: 10px;
    padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:hover { background: #6d28d9; }
</style>
</head>
<body>
  <img src="{% static 'img/logo.png' %}" alt="Mendoura">
  <h1>You're offline</h1>
  <p>Mendoura needs a connection to load courses and lectures. Check your internet and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
