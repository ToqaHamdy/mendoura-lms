{% extends 'base.html' %}
{% block content %}
<div class="min-h-[calc(100vh-73px)] grid grid-cols-1 lg:grid-cols-2">

  <div class="hidden lg:flex flex-col justify-center px-16 bg-gradient-to-br from-brand-600 to-brand-700 text-white relative overflow-hidden">
    <div class="absolute -top-24 -right-24 w-96 h-96 rounded-full bg-white/10"></div>
    <div class="absolute -bottom-32 -left-16 w-80 h-80 rounded-full bg-white/10"></div>
    <div class="absolute top-1/3 left-1/2 w-64 h-64 rounded-full bg-white/5"></div>
    <div class="relative z-10">
      {% block illustration_content %}{% endblock %}
    </div>
  </div>

  <div class="flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-md">
      {% block auth_form_content %}{% endblock %}
    </div>
  </div>

</div>
{% endblock %}
