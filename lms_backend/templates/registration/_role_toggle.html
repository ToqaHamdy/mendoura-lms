<div class="flex p-1 mb-8 rounded-xl bg-gray-100 dark:bg-gray-800">
  <a href="{% url 'student_signup' %}"
     class="flex-1 text-center py-2.5 rounded-lg text-sm font-semibold transition
       {% if active == 'student' %}bg-white dark:bg-gray-900 text-brand-600 shadow-sm{% else %}text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200{% endif %}">
    <i class="fa-solid fa-graduation-cap mr-1"></i> Student
  </a>
  <a href="{% url 'instructor_signup' %}"
     class="flex-1 text-center py-2.5 rounded-lg text-sm font-semibold transition
       {% if active == 'instructor' %}bg-white dark:bg-gray-900 text-brand-600 shadow-sm{% else %}text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200{% endif %}">
    <i class="fa-solid fa-chalkboard-user mr-1"></i> Instructor
  </a>
</div>
