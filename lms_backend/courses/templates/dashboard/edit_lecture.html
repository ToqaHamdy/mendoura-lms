{% extends 'base.html' %}
{% block title %}Edit {{ lecture.title }} - {{ course.title }}{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-6 py-12">

  <a href="{% url 'manage_lectures' course.id module.id %}" class="text-sm text-brand-600 hover:underline">
    <i class="fa-solid fa-arrow-left"></i> {{ module.title }}
  </a>

  <h1 class="text-3xl font-extrabold mt-4 mb-8">Edit Lecture</h1>

  <form method="post" enctype="multipart/form-data" class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-8 space-y-5">
    {% csrf_token %}

    <div>
      <label class="block text-sm font-semibold mb-2">Lecture Title</label>
      {{ form.title }}
    </div>

    <div>
      <label class="block text-sm font-semibold mb-2">Order (position in module)</label>
      {{ form.order }}
    </div>

    <div class="border-t border-gray-200 dark:border-gray-800 pt-5">
      <label class="block text-sm font-semibold mb-2">Video URL <span class="text-gray-400 font-normal">(YouTube, Vimeo, etc.)</span></label>
      {{ form.video_url }}
    </div>

    <div>
      <label class="block text-sm font-semibold mb-2">Video File <span class="text-gray-400 font-normal">(check "Clear" to remove and replace)</span></label>
      {{ form.video_file }}
    </div>

    <div class="flex items-center gap-2">
      {{ form.is_preview }}
      <label class="text-sm font-semibold">Free preview (viewable without enrollment)</label>
    </div>

    <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 rounded-xl transition">
      Save Changes
    </button>
  </form>

</div>
{% endblock %}
